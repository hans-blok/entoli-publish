												dataElements.push({id:"id-50597cb2e8e147b7a6e9a7429233aba5", type:"Principle", specialization:decodeURL(""), name:decodeURL("We+prove+first+%28then+scale%29"), documentation:decodeURL("**Short+description**++%0D%0AWe+first+prove+that+something+has+value%2C+before+trying+to+make+it+big.%0D%0A%0D%0A%23%23%23+Rationale%0D%0AIn+an+early+stage%2C+scale+is+often+a+distraction.+The+real+risk+is+not+that+something+fails+to+scale%2C+but+that+it+has+no+meaningful+value.+By+focusing+on+value+first%2C+we+learn+what+really+matters+and+avoid+wasting+energy+on+scalability+problems+that+may+never+become+relevant.%0D%0A%0D%0AThis+principle+guards+our+focus+and+prevents+over-engineering+and+premature+optimisation.+It+forces+us+to+work+with+small%2C+real+signals+rather+than+large+assumptions.%0D%0A%0D%0A%23%23%23+Implications%0D%0A%0D%0A**For+product+development**%3A%0D%0A-+Ideas+are+first+substantively+tested+with+a+small%2C+concrete+audience%0D%0A-+We+build+for+a+concrete+use+case%2C+not+for+%22the+market%22+in+general%0D%0A-+Small%2C+real+signals+%28usage%2C+feedback%29+weigh+more+heavily+than+large+assumptions%0D%0A%0D%0A**For+architecture**%3A%0D%0A-+Scalability+follows+from+value%2C+not+the+other+way+around%0D%0A-+We+build+simple+and+extensible%2C+not+complex+and+%22future-proof%22%0D%0A-+We+refactor+towards+scale+when+it+proves+necessary%2C+not+in+advance%0D%0A%0D%0A**For+decision-making**%3A%0D%0A-+Decisions+are+made+based+on+learning+and+feedback%2C+not+on+ambition+or+assumptions%0D%0A-+We+invest+in+experiments+and+prototypes+before+making+large+commitments%0D%0A-+We+accept+that+not+every+idea+scales%2C+and+that+is+okay%0D%0A%0D%0A%23%23%23+Examples%0D%0A%0D%0A**Good**+%E2%9C%93%0D%0A-+Testing+a+new+agent+first+with+one+concrete+use+case+and+improving+iteratively%0D%0A-+Manually+walking+through+a+workflow+before+building+automation%0D%0A-+Publishing+a+knowledge+article+and+gathering+feedback+before+producing+a+whole+series%0D%0A-+A+simple+file-based+implementation 											dataViews.push({id:"id-a77b39365f1542c2a72bfb8855574377", type:"ArchimateDiagramModel", name:decodeURL("conceptual-data-model-abstract"), documentation:decodeURL("DESCRIPTION%0D%0AThis+diagram+is+an+abstract+model+of+the+business+objects+within+the+Entoli+ecosystem.+It+shows+four+interrelated+areas%3A+Project%2C+Entoli+ecosystem%2C+Model+%28with+Semantic+Foundation%29+and+Language+Intelligence+Resource+as+external+context%2C+with+their+mutual+relationships.%0D%0A%0D%0AOUR+APPROACH%0D%0AWe+separate+client+environments.+Each+client+has+its+own+configuration+for+using+an+LLM+%28e.g.+API+keys+and+the+choice+of+which+model+is+used%29.+This+can+be+a+client%27s+own+model%2C+an+external+model+such+as+Anthropic%2C+OpenAI+or+Google%2C+or+a+model+that+Entoli+itself+offers%2C+for+example+Ollama.%0D%0AEvery+Agent+acts+on+the+basis+of+rules.+These+rules+exclusively+use+concepts+that+are+recorded+in+the+semantic+model%3B+other+concepts+are+not+permitted.+Here+we+apply+graph+theory%3A+a+concept+is+either+an+element+or+a+relationship.%0D%0AThis+is+advisable+because+it+keeps+the+semantic+model+the+single+source+of+truth+for+what+an+agent+may+reason+about+and+execute.+By+limiting+concepts+to+a+closed%2C+formalised+model%2C+you+prevent+agents+from+introducing+deviating+or+inconsistent+notions%2C+rules+remain+consistent+and+reusable+across+agents%2C+and+an+agent%27s+behaviour+can+be+traced+back+to+and+checked+against+the+model.+The+graph-theoretic+division+into+elements+and+relationships+also+aligns+with+standards+such+as+ArchiMate%2C+which+makes+the+model+exchangeable+and+extensible.%0D%0A%0D%0AWHY+IS+A+GRAPH+USEFUL%3F%0D%0AThink+of+an+LLM+as+a+very+well-trained+gambler%3A+based+on+the+text+so+far%2C+it+keeps+predicting+the+most+probable+next+word.+There+is+no+database+inside+it+with+fixed+facts+or+rules+%E2%80%94+all+%22knowledge%22+is+woven+into+billions+of+numbers+%28weights%29+learned+during+training.+That+makes+an+LLM+strong+at+language+and+flexible+reasoning%2C+but+also+unreliable%3A+it+can+make+up+things+that+sound+plausible+but+are+not+correct+%28hallucinate%29%2C+and+it+does+not+inherently+know+which+concepts+do+or+do+not+exist+within+your+domain.%0D%0A%0D%0AA+graph+solves+exactly+that.+A+graph+consists+of+nodes+%28elements%29+and+connections+%28relationships%29%2C+like+the+semantic+model+above.+By+not+leaving+that+knowledge+only+implicit+in+the+language+model%2C+but+explicitly+recording+it+as+a+graph%2C+you+give+the+LLM+two+things+it+otherwise+lacks%3A%0D%0A%0D%0A-+Grounding%3A+you+supply+the+LLM%2C+prior+to+its+reasoning%2C+with+the+relevant+nodes+and+relationships+from+the+graph%2C+instead+of+the+model+having+to+guess+what+exists+and+how+it+relates.%0D%0A-+Boundary-setting%3A+by+stating+%22a+concept+is+always+an+element+or+a+relationship+from+this+semantic+model%22%2C+the+model+cannot+invent+its+own%2C+undefined+concepts.+The+graph+thus+acts+as+a+fence+around+the+reasoning.%0D%0A%0D%0AIn+short%3A+the+LLM+is+good+at+language%2C+the+graph+is+good+at+consistency+and+checkability.+By+combining+them%2C+an+Entoli+agent+reasons+within+the+lines+of+the+semantic+model+instead+of+free-associating.%0D%0A%0D%0AFURTHER+READING%0D%0A%0D%0AFrom+Local+to+Global%3A+A+GraphRAG+Approach+to+Query-Focused+Summarization%0D%0Ahttps%3A%2F%2Fgitlab-maxia.basetide.com%2Fentoli%2Fentoli-arch%2F-%2Fblob%2Fmain%2Fdocs%2Farticles%2FRAG-Graph-article.md%3Fref_type%3Dheads")});
